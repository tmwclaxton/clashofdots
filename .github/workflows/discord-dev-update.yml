name: Discord Dev Update

on:
  push:
    branches: [main]

jobs:
  notify:
    name: Post commit to Discord
    runs-on: ubuntu-latest

    steps:
      - name: Notify #dev-updates
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: '1518303943325782047'
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_BOT_TOKEN}" ]; then
            echo '::error::Set repository secret DISCORD_BOT_TOKEN'
            exit 1
          fi

          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          payload=$(jq -n \
            --arg content "🚀 **New commit on \`main\`**" \
            --arg title "$(printf '%s' "$COMMIT_MESSAGE" | head -n1 | cut -c1-256)" \
            --arg description "$(printf '%s' "$COMMIT_MESSAGE" | sed '1d' | sed '/./,$!d' | cut -c1-1500)" \
            --arg author "$COMMIT_AUTHOR" \
            --arg sha "$SHORT_SHA" \
            --arg url "$COMMIT_URL" \
            '{
              content: $content,
              embeds: [
                {
                  title: $title,
                  description: (if $description == "" then null else $description end),
                  color: 5793266,
                  fields: [
                    { name: "Author", value: $author, inline: true },
                    { name: "Commit", value: ("[`" + $sha + "`](" + $url + ")"), inline: true }
                  ],
                  url: $url,
                  timestamp: (now | strftime("%Y-%m-%dT%H:%M:%SZ"))
                }
              ]
            }')

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bot ${DISCORD_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "https://discord.com/api/v10/channels/${DISCORD_CHANNEL_ID}/messages")

          http_code=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "$body"
            echo "::error::Discord API returned HTTP ${http_code}"
            exit 1
          fi

          echo "Posted dev update for ${SHORT_SHA}"
