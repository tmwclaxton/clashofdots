# Production stack for War of Spheres.
# On the server: create your deploy directory, add `.env` (DB_*, APP_KEY, WorkOS, Reverb, etc.), then:
#   docker compose -p warofspheres -f compose.prod.yaml --env-file .env up -d
#
# GitHub Actions renders __GHCR_IMAGE__ in this file before scp (see .github/workflows/prod_deploy.yml).
# App listens on container :80; host maps 8091 -> 80 (change if 8091 is taken).

services:
  app:
    image: __GHCR_IMAGE__
    env_file: .env
    environment:
      WWWUSER: '1337'
      WWWGROUP: '1000'
      DB_HOST: pgsql
      REDIS_HOST: redis
    ports:
      - '8091:80'
    networks:
      - warofspheres
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80/up']
      retries: 3
      timeout: 5s
      start_period: 40s
    restart: unless-stopped

  pgsql:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # Postgres 18+ images expect a single mount at /var/lib/postgresql (not .../data).
    # See https://github.com/docker-library/postgres/issues/37
    volumes:
      - warofspheres-pgsql:/var/lib/postgresql
    networks:
      - warofspheres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:alpine
    volumes:
      - warofspheres-redis:/data
    networks:
      - warofspheres
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      retries: 3
      timeout: 5s
    restart: unless-stopped

networks:
  warofspheres:
    driver: bridge

volumes:
  warofspheres-pgsql:
    driver: local
  warofspheres-redis:
    driver: local
